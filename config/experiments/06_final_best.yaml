# exp/06 — final: combined best of exp/02–05, long run.
#
# Takes the union of the winning ingredients from the prior four
# experiments:
#   - aggressive augmentation stack from exp/02
#   - cosine LR + warmup from exp/03
#   - AdamW optimizer + tuned lr from exp/04
#   - label smoothing + weight decay + geometric aug from exp/05
# Trains with a longer horizon and patience-based early stopping so
# the run terminates when val mAP plateaus.
#
# Architecture/input unchanged: yolov8s, imgsz=640. Only hyperparameters,
# optimizer, LR schedule, regularisation, and augmentations are varied
# across the series.
#
# The resulting best.pt replaces Models/Car_Detector.pt and is
# registered as Car_Detector@v2 via Training/promote_best.py.
#
# Run:
#   python Training/train.py \
#       --exp-name exp06_final_best \
#       --overrides config/experiments/06_final_best.yaml
#
# Then promote:
#   python Training/promote_best.py \
#       --run-dir Training/runs/exp06_final_best \
#       --version v2

tags: ["exp06", "final", "promote-candidate"]

epochs: 300
patience: 30

optimizer: AdamW
lr0: 0.001
lrf: 0.01
weight_decay: 0.02
warmup_epochs: 3.0
cos_lr: true

label_smoothing: 0.1

mosaic: 1.0
mixup: 0.15
copy_paste: 0.10
hsv_h: 0.025
hsv_s: 0.8
hsv_v: 0.5
translate: 0.20
scale: 0.7
degrees: 5.0
shear: 2.0
perspective: 0.0005
fliplr: 0.5
