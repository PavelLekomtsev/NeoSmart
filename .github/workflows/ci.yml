name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new commit lands — no
# point burning CI minutes on a stale revision.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pavellekomtsev/neosmart

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          # PlateScanner is a git submodule; without it the web_app imports blow up.
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            SmartParking/requirements.txt
            SmartParking/requirements-dev.txt

      - name: Install system deps (libGL for opencv-python)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install torch (CPU wheel)
        run: |
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            torch==2.5.1+cpu torchvision==0.20.1+cpu

      - name: Install project + dev deps
        run: |
          pip install -r SmartParking/requirements.txt
          pip install -r SmartParking/requirements-dev.txt
          pip install -e .

      # Ruff is scoped to the modules that have been through Phase 0's
      # refactor pass — the wider repo (legacy/, pre-refactor web_app)
      # still has ~50 cosmetic violations that aren't worth fixing
      # ahead of their owning refactor commit. Widen the scope as each
      # module lands its clean-up.
      - name: Ruff — lint
        run: ruff check tests SmartParking/neosmart

      - name: Ruff — format check
        run: ruff format --check tests SmartParking/neosmart

      # Mypy is warn-only for now: the legacy modules and a handful of
      # untyped ML libraries still generate noise. Strict mode lives in
      # pyproject.toml [[tool.mypy.overrides]] targeting just neosmart.*
      # — tighten the gate once that core is clean.
      - name: Mypy (warn-only)
        continue-on-error: true
        run: mypy SmartParking/neosmart

      - name: Pytest with coverage
        run: pytest --cov --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-and-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # PRs (especially from forks) can't access the packages:write
      # token, so we skip login and push for them — the build still
      # runs as a smoke check that the Dockerfile compiles.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates a coherent set of tags for the image:
      #   - branch name (e.g. "main")
      #   - git tag      (e.g. "jmlc-2026")
      #   - short sha    (e.g. "sha-1abc409")
      #   - "latest"     only when building the default branch
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # PRs build-only (verify Dockerfile still works);
          # pushes to main and git tags publish to ghcr.io.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
